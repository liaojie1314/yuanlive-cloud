# 监听端口
listen              1935;
max_connections     1000;
daemon              off;

# 开启 HTTP API (用于监控)
http_api {
    enabled         on;
    listen          1985;
}

# 开启 HTTP Server (用于分发 FLV 和 HLS 流)
http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

vhost __defaultVhost__ {
    # 最小延迟配置
    tcp_nodelay     on;
    min_latency     on;

    # 开启 HTTP-FLV 播放支持 (低延迟，B站同款技术)
    http_remux {
        enabled     on;
        mount       [vhost]/[app]/[stream].flv;
    }

    # 开启 HLS 播放支持 (m3u8, 兼容iOS)
    hls {
        enabled     on;
    }

    # --- 关键：后续对接 SpringCloud 的地方 ---
    # http_hooks {
    #     enabled         on;
    #     # 推流时回调（鉴权）
    #     on_publish      http://host.docker.internal:8081/api/callback/on_publish;
    #     # 关播时回调
    #     on_unpublish    http://host.docker.internal:8081/api/callback/on_unpublish;
    # }
}